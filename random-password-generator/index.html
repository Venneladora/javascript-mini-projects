<!DOCTYPE html>
<html lang="en">
<head>
    <title>Password Generator</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }

        .options {
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Password Generator</h1>

    <label>Password Length</label>
    <input type="number" id="length" value="12">

    <div class="options">
        <label><input type="checkbox" id="lowercase" checked> Lowercase</label><br>
        <label><input type="checkbox" id="uppercase" checked> Uppercase</label><br>
        <label><input type="checkbox" id="numbers" checked> Numbers</label><br>
        <label><input type="checkbox" id="symbols" checked> Symbols</label>
    </div>

    <button onclick="createPassword()">Generate Password</button>

    <input type="text" id="result" readonly placeholder="Password appears here">
</div>

<script>
function generatePassword(length, includeLowercase, includeUppercase, includeNumbers, includeSymbols)
{
    const lowercasechars="abcdefghijklmnopqrstuvwxyz";
    const uppercasechars="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const numberschars="0123456789";
    const symbolschars="!@#$%^&*";

    let allowedchars="";
    let password="";

    allowedchars+=includeLowercase?lowercasechars:"";
    allowedchars+=includeUppercase?uppercasechars:"";
    allowedchars+=includeNumbers?numberschars:"";
    allowedchars+=includeSymbols?symbolschars:"";

    if(length<=0){
        return "Password length must be at least 1";
    }

    if(allowedchars.length===0){
        return "Select at least one option";
    }

    for(let i=0;i<length;i++){
        const randomIndex=Math.floor(Math.random()*allowedchars.length);
        password+=allowedchars[randomIndex];
    }

    return password;
}

function createPassword(){
    const length=document.getElementById("length").value;
    const lowercase=document.getElementById("lowercase").checked;
    const uppercase=document.getElementById("uppercase").checked;
    const numbers=document.getElementById("numbers").checked;
    const symbols=document.getElementById("symbols").checked;

    const password=generatePassword(length,lowercase,uppercase,numbers,symbols);
    document.getElementById("result").value=password;
}
</script>

</body>
</html>
